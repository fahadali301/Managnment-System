{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | University Admin Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .auth-card {
            backdrop-filter: blur(18px);
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            color: #fff;
            width: 100%;
            max-width: 560px;
            animation: fadeIn 0.8s ease;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 12px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
            border: 1px solid #00c6ff;
            color: #fff;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            transition: 0.3s;
            color: #fff;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.5);
            color: #fff;
        }

        .auth-title {
            font-weight: 600;
        }

        .text-muted {
            color: rgba(255, 255, 255, 0.7) !important;
        }

        .form-label {
            color: #e2e8f0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="auth-card p-4 p-md-5">
    <div class="text-center mb-4">
        <h4 class="auth-title">Create Account</h4>
        <p class="text-muted">Register to access University Admin Portal</p>
    </div>

    <form id="registerForm" method="POST" action="/api/register/">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="Enter email" required>
            </div>
            <div class="col-12">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" class="form-control form-control-lg" id="full_name" name="full_name" placeholder="Enter full name" required>
            </div>
            <div class="col-md-6">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Enter password" required>
            </div>
            <div class="col-md-6">
                <label for="password2" class="form-label">Confirm Password</label>
                <input type="password" class="form-control form-control-lg" id="password2" name="password2" placeholder="Confirm password" required>
            </div>
        </div>

        <div class="d-grid mt-4">
            <button type="submit" class="btn btn-gradient btn-lg" id="registerSubmitBtn">Register</button>
        </div>

        <div id="registerMessage" class="alert d-none mt-3" role="alert"></div>

        <p class="text-center small mb-0 mt-3 text-muted">
            Already have an account? <a href="/login/" class="text-info">Login</a>
        </p>
    </form>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const payload = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            full_name: document.getElementById('full_name').value,
            password: document.getElementById('password').value,
            password2: document.getElementById('password2').value,
        };

        const messageBox = document.getElementById('registerMessage');
        const submitBtn = document.getElementById('registerSubmitBtn');

        messageBox.className = 'alert d-none mt-3';
        messageBox.textContent = '';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';

        try {
            const response = await fetch('/api/register/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });

            const data = await response.json();

            if (response.ok) {
                messageBox.className = 'alert alert-success mt-3';
                messageBox.textContent = 'Registration successful. Redirecting to login...';
                setTimeout(() => {
                    window.location.href = '/login/';
                }, 1200);
                return;
            }

            messageBox.className = 'alert alert-danger mt-3';
            const firstError = Object.values(data)[0];
            messageBox.textContent = Array.isArray(firstError) ? firstError[0] : 'Registration failed';
        } catch (error) {
            messageBox.className = 'alert alert-danger mt-3';
            messageBox.textContent = 'Server error. Try again.';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Register';
        }
    });
</script>
</body>
</html>
