{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-page">

    <div class="container px-3">
        <div class="row justify-content-center">
            <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">

                <div class="text-center mb-4">
                    <a href="{% url 'home' %}" class="text-white text-decoration-none">
                        <i class="fas fa-briefcase fa-2x"></i>
                        <h5 class="mt-2 fw-bold">Management System</h5>
                    </a>
                </div>

                <div class="card auth-card border-0 shadow-lg">
                    <div class="card-body">

                        <div class="auth-icon">
                            <i class="fas fa-lock"></i>
                        </div>

                        <h4 class="text-center fw-bold mb-1">Welcome back</h4>
                        <p class="text-center text-muted mb-4">Sign in to your account</p>

                        <!-- Alert container -->
                        <div id="alert-container"></div>

                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-user text-muted"></i>
                                    </span>
                                    <input type="text"
                                           class="form-control border-start-0 ps-0"
                                           id="username"
                                           name="username"
                                           placeholder="Enter your username"
                                           required
                                           autocomplete="username">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-lock text-muted"></i>
                                    </span>
                                    <input type="password"
                                           class="form-control border-start-0 ps-0"
                                           id="password"
                                           name="password"
                                           placeholder="Enter your password"
                                           required
                                           autocomplete="current-password">
                                    <button class="btn btn-outline-secondary border-start-0" type="button"
                                            id="togglePassword" title="Show/hide password">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                        </form>

                        <p class="text-center text-muted mb-0" style="font-size:0.9rem;">
                            Don't have an account?
                            <a href="{% url 'register' %}" class="text-primary fw-semibold">Create one</a>
                        </p>

                    </div>
                </div>

                <p class="text-center text-white-50 mt-3" style="font-size:0.8rem;">
                    &copy; 2026 Management System
                </p>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const input = document.getElementById('password');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
