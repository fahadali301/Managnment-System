{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | University Admin Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
}

/* Glass Card */
.auth-card {
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    color: #fff;
    width: 100%;
    max-width: 420px;
}

/* Inputs */
.form-control {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    padding: 12px;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.6);
}

.form-control:focus {
    background: rgba(255,255,255,0.15);
    box-shadow: none;
    border: 1px solid #00c6ff;
    color: #fff;
}

/* Button */
.btn-gradient {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    border: none;
    transition: 0.3s;
}

.btn-gradient:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,114,255,0.5);
}

/* Heading */
.auth-title {
    font-weight: 600;
}

/* Small text */
.text-muted {
    color: rgba(255,255,255,0.7) !important;
}

/* Animation */
.auth-card {
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<div class="auth-card p-4 p-md-5">

    <div class="text-center mb-4">
        <h4 class="auth-title">University Admin Portal</h4>
        <p class="text-muted">Sign in to continue</p>
    </div>

    <form id="loginForm">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control form-control-lg" id="username" placeholder="Enter username" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" class="form-control form-control-lg" id="password" placeholder="Enter password" required>
        </div>

        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-gradient btn-lg" id="loginSubmitBtn">
                Login
            </button>
        </div>

        <div id="loginMessage" class="alert d-none" role="alert"></div>

        <p class="text-center small mb-0 text-muted">
            Don't have an account? <a href="/register/" class="text-info">Create account</a>
        </p>

    </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const message = document.getElementById("loginMessage");
    const submitBtn = document.getElementById("loginSubmitBtn");

    message.className = "alert d-none";

    submitBtn.disabled = true;
    submitBtn.textContent = "Signing in...";

    try {
        const response = await fetch("/api/login/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: document.getElementById("username").value,
                password: document.getElementById("password").value,
            }),
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem("access", data.access);
            localStorage.setItem("refresh", data.refresh);
            window.location.replace("/dashboard/");
            return;
        }

        message.className = "alert alert-danger";
        message.textContent = data.detail || "Invalid credentials";

    } catch (error) {
        message.className = "alert alert-danger";
        message.textContent = "Server error. Try again.";

    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Login";
    }
});
</script>

</body>
</html>
